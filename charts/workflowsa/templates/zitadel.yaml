{{- if .Values.zitadel.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "workflowsa.zitadelBootstrapPvc" . }}
  labels:
    {{- include "workflowsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-bootstrap
spec:
  accessModes:
    {{- toYaml .Values.zitadel.bootstrapStorage.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.zitadel.bootstrapStorage.size }}
  {{- if .Values.zitadel.bootstrapStorage.storageClassName }}
  storageClassName: {{ .Values.zitadel.bootstrapStorage.storageClassName | quote }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "workflowsa.workflowsaBootstrapPvc" . }}
  labels:
    {{- include "workflowsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: workflowsa-bootstrap
spec:
  accessModes:
    {{- toYaml .Values.zitadel.bootstrapStorage.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.zitadel.bootstrapStorage.size }}
  {{- if .Values.zitadel.bootstrapStorage.storageClassName }}
  storageClassName: {{ .Values.zitadel.bootstrapStorage.storageClassName | quote }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "workflowsa.fullname" . }}-zitadel-bootstrap-script
  labels:
    {{- include "workflowsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-login
data:
  bootstrap_zitadel.mjs: |-
{{ .Files.Get "files/bootstrap_zitadel.mjs" | indent 4 }}
{{- if .Values.zitadel.postgresql.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "workflowsa.fullname" . }}-zitadel-postgresql
  labels:
    {{- include "workflowsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-postgresql
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    {{- include "workflowsa.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "workflowsa.fullname" . }}-zitadel-postgresql
  labels:
    {{- include "workflowsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-postgresql
spec:
  serviceName: {{ include "workflowsa.fullname" . }}-zitadel-postgresql
  replicas: 1
  selector:
    matchLabels:
      {{- include "workflowsa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: zitadel-postgresql
  template:
    metadata:
      labels:
        {{- include "workflowsa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: zitadel-postgresql
    spec:
      containers:
        - name: postgresql
          image: "{{ .Values.zitadel.postgresql.image.repository }}:{{ .Values.zitadel.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.zitadel.postgresql.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.zitadel.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.zitadel.postgresql.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "workflowsa.zitadelSecretName" . }}
                  key: ZITADEL_POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.zitadel.postgresql.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.zitadel.postgresql.size }}
        {{- if .Values.zitadel.postgresql.storageClassName }}
        storageClassName: {{ .Values.zitadel.postgresql.storageClassName | quote }}
        {{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "workflowsa.fullname" . }}-zitadel-api
  labels:
    {{- include "workflowsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-api
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    {{- include "workflowsa.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "workflowsa.fullname" . }}-zitadel-api
  labels:
    {{- include "workflowsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-api
spec:
  replicas: {{ .Values.zitadel.api.replicas }}
  selector:
    matchLabels:
      {{- include "workflowsa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: zitadel-api
  template:
    metadata:
      labels:
        {{- include "workflowsa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: zitadel-api
    spec:
      containers:
        - name: zitadel-api
          image: "{{ .Values.zitadel.api.image.repository }}:{{ .Values.zitadel.api.image.tag }}"
          imagePullPolicy: {{ .Values.zitadel.api.image.pullPolicy }}
          args:
            - start-from-init
            - --masterkey
            - $(ZITADEL_MASTERKEY)
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ZITADEL_MASTERKEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "workflowsa.zitadelSecretName" . }}
                  key: ZITADEL_MASTERKEY
            - name: ZITADEL_DATABASE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "workflowsa.zitadelSecretName" . }}
                  key: ZITADEL_DATABASE_POSTGRES_DSN
            - name: ZITADEL_PORT
              value: "8080"
            - name: ZITADEL_EXTERNALDOMAIN
              value: {{ .Values.zitadel.externalDomain | quote }}
            - name: ZITADEL_EXTERNALPORT
              value: {{ .Values.zitadel.externalPort | quote }}
            - name: ZITADEL_EXTERNALSECURE
              value: {{ .Values.zitadel.externalSecure | quote }}
            - name: ZITADEL_TLS_ENABLED
              value: "false"
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME
              value: {{ .Values.zitadel.bootstrap.adminUsername | quote }}
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "workflowsa.zitadelSecretName" . }}
                  key: ZITADEL_ADMIN_PASSWORD
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED
              value: "false"
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME
              value: {{ .Values.zitadel.bootstrap.adminGivenName | quote }}
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME
              value: {{ .Values.zitadel.bootstrap.adminFamilyName | quote }}
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_DISPLAYNAME
              value: {{ .Values.zitadel.bootstrap.adminDisplayName | quote }}
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS
              value: {{ .Values.zitadel.bootstrap.adminEmail | quote }}
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED
              value: "true"
            - name: ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_MINLENGTH
              value: "5"
            - name: ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_HASLOWERCASE
              value: "false"
            - name: ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_HASUPPERCASE
              value: "false"
            - name: ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_HASNUMBER
              value: "false"
            - name: ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_HASSYMBOL
              value: "false"
            - name: ZITADEL_FIRSTINSTANCE_PATPATH
              value: /zitadel/bootstrap/owner.pat
            - name: ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME
              value: workflowsa-bootstrap
            - name: ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME
              value: workflowsa-bootstrap
            - name: ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE
              value: "2099-01-01T00:00:00Z"
            - name: ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH
              value: /zitadel/bootstrap/login-client.pat
            - name: ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME
              value: login-client
            - name: ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME
              value: workflow-login-client
            - name: ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE
              value: "2099-01-01T00:00:00Z"
            - name: ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED
              value: "true"
            - name: ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI
              value: {{ printf "%s/ui/v2/login/" (trimSuffix "/" .Values.zitadel.publicUrl) | quote }}
            - name: ZITADEL_OIDC_DEFAULTLOGINURLV2
              value: {{ printf "%s/ui/v2/login/login?authRequest=" (trimSuffix "/" .Values.zitadel.publicUrl) | quote }}
            - name: ZITADEL_OIDC_DEFAULTLOGOUTURLV2
              value: {{ printf "%s/ui/v2/login/logout?post_logout_redirect=" (trimSuffix "/" .Values.zitadel.publicUrl) | quote }}
            - name: ZITADEL_SAML_DEFAULTLOGINURLV2
              value: {{ printf "%s/ui/v2/login/login?samlRequest=" (trimSuffix "/" .Values.zitadel.publicUrl) | quote }}
            - name: ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED
              value: "true"
          volumeMounts:
            - name: zitadel-bootstrap
              mountPath: /zitadel/bootstrap
          livenessProbe:
            httpGet:
              path: /debug/healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /debug/ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.zitadel.api.resources | nindent 12 }}
      volumes:
        - name: zitadel-bootstrap
          persistentVolumeClaim:
            claimName: {{ include "workflowsa.zitadelBootstrapPvc" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "workflowsa.fullname" . }}-zitadel-login
  labels:
    {{- include "workflowsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-login
spec:
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    {{- include "workflowsa.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-login
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "workflowsa.fullname" . }}-zitadel-login
  labels:
    {{- include "workflowsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-login
spec:
  replicas: {{ .Values.zitadel.login.replicas }}
  selector:
    matchLabels:
      {{- include "workflowsa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: zitadel-login
  template:
    metadata:
      labels:
        {{- include "workflowsa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: zitadel-login
    spec:
      containers:
        - name: zitadel-login
          image: "{{ .Values.zitadel.login.image.repository }}:{{ .Values.zitadel.login.image.tag }}"
          imagePullPolicy: {{ .Values.zitadel.login.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - node /scripts/bootstrap_zitadel.mjs && exec /app/entrypoint.sh node apps/login/server.js
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: ZITADEL_API_URL
              value: {{ include "workflowsa.zitadelApiUrl" . | quote }}
            - name: NEXT_PUBLIC_BASE_PATH
              value: /ui/v2/login
            - name: ZITADEL_SERVICE_USER_TOKEN_FILE
              value: /zitadel/bootstrap/login-client.pat
            - name: CUSTOM_REQUEST_HEADERS
              value: {{ printf "Host:%s,X-Forwarded-Proto:%s" .Values.zitadel.externalDomain (ternary "https" "http" .Values.zitadel.externalSecure) | quote }}
            - name: ZITADEL_INTERNAL_URL
              value: {{ include "workflowsa.zitadelApiUrl" . | quote }}
            - name: ZITADEL_PUBLIC_URL
              value: {{ .Values.zitadel.publicUrl | quote }}
            - name: ZITADEL_OWNER_PAT_FILE
              value: /zitadel/bootstrap/owner.pat
            - name: WORKFLOWSA_FRONTEND_CLIENT_ID_FILE
              value: /workflowsa/bootstrap/workflowsa-frontend-client-id
            - name: WORKFLOWSA_ZITADEL_BOOTSTRAP_STATE_FILE
              value: /workflowsa/bootstrap/workflowsa-zitadel.json
            - name: WORKFLOWSA_FRONTEND_URL
              value: {{ .Values.zitadel.bootstrap.frontendUrl | quote }}
            - name: WORKFLOWSA_PROJECT_NAME
              value: {{ .Values.zitadel.bootstrap.projectName | quote }}
            - name: WORKFLOWSA_FRONTEND_APP_NAME
              value: {{ .Values.zitadel.bootstrap.frontendAppName | quote }}
            - name: ZITADEL_ADMIN_USERNAME
              value: {{ .Values.zitadel.bootstrap.adminUsername | quote }}
            - name: ZITADEL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "workflowsa.zitadelSecretName" . }}
                  key: ZITADEL_ADMIN_PASSWORD
            - name: ZITADEL_ADMIN_GIVEN_NAME
              value: {{ .Values.zitadel.bootstrap.adminGivenName | quote }}
            - name: ZITADEL_ADMIN_FAMILY_NAME
              value: {{ .Values.zitadel.bootstrap.adminFamilyName | quote }}
            - name: ZITADEL_ADMIN_DISPLAY_NAME
              value: {{ .Values.zitadel.bootstrap.adminDisplayName | quote }}
            - name: ZITADEL_ADMIN_EMAIL
              value: {{ .Values.zitadel.bootstrap.adminEmail | quote }}
            - name: ZITADEL_ADMIN_LOGIN_NAME
              value: {{ .Values.zitadel.bootstrap.adminLoginName | quote }}
            - name: ZITADEL_BOOTSTRAP_WAIT_SECONDS
              value: {{ .Values.zitadel.bootstrap.waitSeconds | quote }}
          volumeMounts:
            - name: bootstrap-script
              mountPath: /scripts/bootstrap_zitadel.mjs
              subPath: bootstrap_zitadel.mjs
              readOnly: true
            - name: zitadel-bootstrap
              mountPath: /zitadel/bootstrap
              readOnly: true
            - name: workflowsa-bootstrap
              mountPath: /workflowsa/bootstrap
          livenessProbe:
            httpGet:
              path: /ui/v2/login/healthy
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ui/v2/login/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.zitadel.login.resources | nindent 12 }}
      volumes:
        - name: bootstrap-script
          configMap:
            name: {{ include "workflowsa.fullname" . }}-zitadel-bootstrap-script
        - name: zitadel-bootstrap
          persistentVolumeClaim:
            claimName: {{ include "workflowsa.zitadelBootstrapPvc" . }}
        - name: workflowsa-bootstrap
          persistentVolumeClaim:
            claimName: {{ include "workflowsa.workflowsaBootstrapPvc" . }}
{{- if .Values.zitadel.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "workflowsa.fullname" . }}-zitadel
  labels:
    {{- include "workflowsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel
  {{- with .Values.zitadel.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.zitadel.ingress.className }}
  ingressClassName: {{ .Values.zitadel.ingress.className }}
  {{- end }}
  {{- if .Values.zitadel.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.zitadel.ingress.host | quote }}
      secretName: {{ .Values.zitadel.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.zitadel.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: {{ include "workflowsa.fullname" . }}-zitadel-login
                port:
                  number: 3000
          - path: /ui/v2/login
            pathType: Prefix
            backend:
              service:
                name: {{ include "workflowsa.fullname" . }}-zitadel-login
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "workflowsa.fullname" . }}-zitadel-api
                port:
                  number: 8080
{{- end }}
{{- end }}
