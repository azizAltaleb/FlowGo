iam:
  mode: external
  providerName: "External OIDC Provider"
  auth:
    issuerInternalUrl: "https://login.example.com"
    issuerPublicUrl: "https://login.example.com"
    clientId: workflow-backend
    tokenMode: jwt
    introspectionUrl: ""
    introspectionClientId: ""
    introspectionClientSecret: ""
    introspectionAuthMethod: basic
    claimSubjectPath: sub
    claimRolesPath: roles,realm_access.roles,groups
    claimScopesPath: scope,scp
    claimTenantPath: tenant_id
    claimEmailPath: email
    claimNamePath: name
    enforceAudience: true
    allowInsecureIssuer: false
  frontend:
    oidcAuthority: "https://login.example.com"
    oidcClientId: workflow-frontend
    oidcClientIdFile: ""

zitadel:
  enabled: false

ingress:
  enabled: true
  host: flowgo.example.com
  tls:
    enabled: true
    secretName: flowgo-tls
