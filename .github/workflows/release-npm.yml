name: Release Node.js SDK

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-nodejs-sdk:
    name: Publish @workflowsa/nodejs-sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/nodejs-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: clients/nodejs-sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Package dry run
        run: npm pack --dry-run

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
