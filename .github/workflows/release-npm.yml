name: Release Node.js SDK

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm instead of running validation only
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish-nodejs-sdk:
    name: Publish @flowgo/nodejs-sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/nodejs-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: clients/nodejs-sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Validate package metadata
        run: npm run validate:package

      - name: Package dry run
        run: npm pack --dry-run

      - name: Generate package SBOM
        run: npm sbom --sbom-format cyclonedx --omit dev > flowgo-nodejs-sdk-sbom.cdx.json

      - name: Upload package SBOM
        uses: actions/upload-artifact@v4
        with:
          name: flowgo-nodejs-sdk-sbom
          path: clients/nodejs-sdk/flowgo-nodejs-sdk-sbom.cdx.json
          if-no-files-found: error

      - name: Publish
        if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')) || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
