# Config file for Air - Sync Worker

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/sync-worker ./backend/services/sync-worker/cmd/main.go"
  bin = "./tmp/sync-worker"
  full_bin = ""
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["assets", "tmp", "vendor", "frontend", "node_modules"]
  include_dir = []
  exclude_file = []
  delay = 1000 # ms
  stop_on_error = true
  log = "air_errors.log"

[log]
  time = true

[color]
  main = "yellow"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
