apiVersion: v1
kind: Service
metadata:
  name: {{ include "workflowsa.commandServiceName" . }}
  labels:
    {{- include "workflowsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: command
spec:
  type: {{ .Values.command.service.type }}
  ports:
    - name: http
      port: {{ .Values.command.service.port }}
      targetPort: http
  selector:
    {{- include "workflowsa.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: command
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "workflowsa.fullname" . }}-command
  labels:
    {{- include "workflowsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: command
spec:
  replicas: {{ .Values.replicaCount.command }}
  selector:
    matchLabels:
      {{- include "workflowsa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: command
  template:
    metadata:
      labels:
        {{- include "workflowsa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: command
      {{- with .Values.global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "workflowsa.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: workflow-command
          image: "{{ .Values.images.command.repository }}:{{ .Values.images.command.tag }}"
          imagePullPolicy: {{ .Values.images.command.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "workflowsa.envConfigName" . }}
          env:
            - name: PG_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "workflowsa.envSecretName" . }}
                  key: {{ .Values.postgresql.existingSecretKey | default "PG_DSN" }}
            - name: AUTH_INTROSPECTION_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "workflowsa.envSecretName" . }}
                  key: AUTH_INTROSPECTION_CLIENT_SECRET
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.command.resources | nindent 12 }}
          {{- if .Values.zitadel.enabled }}
          volumeMounts:
            - name: zitadel-bootstrap
              mountPath: /zitadel/bootstrap
            - name: workflowsa-bootstrap
              mountPath: /workflowsa/bootstrap
              readOnly: true
          {{- end }}
      {{- if .Values.zitadel.enabled }}
      volumes:
        - name: zitadel-bootstrap
          persistentVolumeClaim:
            claimName: {{ include "workflowsa.zitadelBootstrapPvc" . }}
        - name: workflowsa-bootstrap
          persistentVolumeClaim:
            claimName: {{ include "workflowsa.workflowsaBootstrapPvc" . }}
      {{- end }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
