apiVersion: v1
kind: Service
metadata:
  name: {{ include "goflow.queryServiceName" . }}
  labels:
    {{- include "goflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: query
spec:
  type: {{ .Values.query.service.type }}
  ports:
    - name: http
      port: {{ .Values.query.service.port }}
      targetPort: http
  selector:
    {{- include "goflow.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: query
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "goflow.fullname" . }}-query
  labels:
    {{- include "goflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: query
spec:
  replicas: {{ .Values.replicaCount.query }}
  selector:
    matchLabels:
      {{- include "goflow.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: query
  template:
    metadata:
      labels:
        {{- include "goflow.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: query
      {{- with .Values.global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "goflow.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: workflow-query
          image: "{{ .Values.images.query.repository }}:{{ .Values.images.query.tag }}"
          imagePullPolicy: {{ .Values.images.query.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: {{ include "goflow.envConfigName" . }}
          env:
            - name: AUTH_INTROSPECTION_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "goflow.envSecretName" . }}
                  key: AUTH_INTROSPECTION_CLIENT_SECRET
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.query.resources | nindent 12 }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
