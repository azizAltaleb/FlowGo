name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Run service tests
        run: go test ./backend/... -count=1

      - name: Run BPMN element matrix tests
        run: make test-bpmn-matrix

      - name: Run outbox/idempotency regression tests
        run: |
          go test ./backend/services/workflow-command/internal/application -run 'Outbox|Idempotency' -count=1
          go test ./backend/services/workflow-command/internal/infrastructure/persistence -run 'Outbox|Idempotency|TerminalFailed' -count=1
          go test ./backend/services/workflow-command/internal/interfaces/http -run 'Idempotency|Protocol|Capabilities|Metrics' -count=1
          go test ./backend/services/sync-worker/... -count=1
          go test ./backend/libs/worker -count=1

  frontend:
    name: Frontend Build and Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  nodejs-sdk:
    name: Node.js SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/nodejs-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/nodejs-sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Validate package metadata
        run: npm run validate:package

      - name: Package dry run
        run: npm pack --dry-run

  docker-build:
    name: Docker Build Dry Run
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: workflow-command
            dockerfile: backend/Dockerfile
            context: .
          - name: workflow-runtime
            dockerfile: backend/Dockerfile.runtime
            context: .
          - name: workflow-query
            dockerfile: backend/Dockerfile.workflow-query
            context: .
          - name: sync-worker
            dockerfile: backend/Dockerfile.sync-worker
            context: .
          - name: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f ${{ matrix.image.dockerfile }} --build-arg VERSION=ci --build-arg REVISION=${{ github.sha }} -t goflow/${{ matrix.image.name }}:ci ${{ matrix.image.context }}

      - name: Scan image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: goflow/${{ matrix.image.name }}:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  compose-smoke:
    name: Compose Profile Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate core/full compose profiles
        run: make smoke-profiles

      - name: Validate release compose profiles
        run: make smoke-release-profiles

      - name: Validate operational scripts
        run: |
          bash -n scripts/init_connector.sh
          bash -n scripts/cqrs_parity_check.sh
          bash -n scripts/cqrs_e2e_smoke.sh
          bash -n scripts/worker_conformance_smoke.sh
          bash -n scripts/validate_helm.sh

      - name: Validate Helm chart
        run: bash scripts/validate_helm.sh

  cqrs-e2e-smoke:
    name: CQRS E2E Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run full CQRS E2E smoke
        env:
          CLEANUP: "true"
          WAIT_TIMEOUT_SEC: "420"
          QUERY_AUTH_MODE: off
          AUTH_ISSUER_INTERNAL_URL: ""
          AUTH_ISSUER_PUBLIC_URL: ""
          AUTH_CLIENT_ID: ""
          OIDC_TOKEN_URL: ""
          OIDC_CLIENT_ID: ""
        run: |
          chmod +x scripts/init_connector.sh scripts/cqrs_e2e_smoke.sh
          ./scripts/cqrs_e2e_smoke.sh
