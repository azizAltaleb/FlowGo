services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: workflow_db
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d workflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  connect:
    image: debezium/connect:2.6
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: workflowsa-debezium
      CONFIG_STORAGE_TOPIC: workflowsa_connect_configs
      OFFSET_STORAGE_TOPIC: workflowsa_connect_offsets
      STATUS_STORAGE_TOPIC: workflowsa_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      ENABLE_DEBEZIUM_SCRIPTING: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  zitadel-postgres:
    image: postgres:17.2-alpine
    container_name: workflow-zitadel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zitadel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - zitadel-postgres-data:/var/lib/postgresql/data:rw
    networks:
      - zitadel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d zitadel -U postgres"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:v4.13.0
    container_name: workflow-zitadel-api
    restart: unless-stopped
    user: "0"
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters"
    environment:
      ZITADEL_PORT: 8080
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 9180
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_DSN: postgresql://postgres:postgres@zitadel-postgres:5432/zitadel?sslmode=disable
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_DISPLAYNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: admin@admin.localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: "true"
      ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_MINLENGTH: "5"
      ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_HASLOWERCASE: "false"
      ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_HASUPPERCASE: "false"
      ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_HASNUMBER: "false"
      ZITADEL_DEFAULTINSTANCE_PASSWORDCOMPLEXITYPOLICY_HASSYMBOL: "false"
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/owner.pat
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: workflowsa-bootstrap
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: workflowsa-bootstrap
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: workflow-login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: http://localhost:9180/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: http://localhost:9180/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: http://localhost:9180/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: http://localhost:9180/ui/v2/login/login?samlRequest=
      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: "true"
      ZITADEL_INSTRUMENTATION_TRACE_EXPORTER_TYPE: none
      ZITADEL_INSTRUMENTATION_TRACE_EXPORTER_ENDPOINT: ""
      ZITADEL_INSTRUMENTATION_TRACE_EXPORTER_INSECURE: "true"
      ZITADEL_INSTRUMENTATION_SERVICENAME: zitadel-api
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:rw
    networks:
      - zitadel
    depends_on:
      zitadel-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    labels:
      traefik.enable: "true"
      traefik.docker.network: zitadel
      traefik.http.services.zitadel-api.loadbalancer.server.port: "8080"
      traefik.http.services.zitadel-api.loadbalancer.server.scheme: h2c
      traefik.http.middlewares.zitadel-strip-api.stripprefix.prefixes: /api
      traefik.http.middlewares.zitadel-strip-api.stripprefix.forceSlash: "false"
      traefik.http.routers.zitadel-api.rule: (Host(`localhost`) || Host(`zitadel-proxy`)) && PathPrefix(`/api`)
      traefik.http.routers.zitadel-api.entrypoints: web
      traefik.http.routers.zitadel-api.middlewares: zitadel-strip-api
      traefik.http.routers.zitadel-api.service: zitadel-api
      traefik.http.routers.zitadel-api.priority: "200"
      traefik.http.routers.zitadel-canonical.rule: (Host(`localhost`) || Host(`zitadel-proxy`)) && !PathPrefix(`/ui/v2/login`) && !PathPrefix(`/api`) && !Path(`/`)
      traefik.http.routers.zitadel-canonical.entrypoints: web
      traefik.http.routers.zitadel-canonical.service: zitadel-api
      traefik.http.routers.zitadel-canonical.priority: "100"

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.13.0
    container_name: workflow-zitadel-login
    restart: unless-stopped
    user: "0"
    entrypoint:
      - /bin/sh
      - -c
      - node /scripts/bootstrap_zitadel.mjs && exec /app/entrypoint.sh node apps/login/server.js
    environment:
      ZITADEL_API_URL: http://zitadel-api:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:localhost,X-Forwarded-Proto:http
      ZITADEL_INTERNAL_URL: http://zitadel-api:8080
      ZITADEL_PUBLIC_URL: http://localhost:9180
      ZITADEL_OWNER_PAT_FILE: /zitadel/bootstrap/owner.pat
      WORKFLOWSA_FRONTEND_CLIENT_ID_FILE: /workflowsa/bootstrap/workflowsa-frontend-client-id
      WORKFLOWSA_ZITADEL_BOOTSTRAP_STATE_FILE: /workflowsa/bootstrap/workflowsa-zitadel.json
      WORKFLOWSA_FRONTEND_URL: http://localhost:9100
      WORKFLOWSA_PROJECT_NAME: Workflowsa
      WORKFLOWSA_FRONTEND_APP_NAME: Workflowsa Frontend
      ZITADEL_ADMIN_USERNAME: admin
      ZITADEL_ADMIN_PASSWORD: admin
      ZITADEL_ADMIN_GIVEN_NAME: admin
      ZITADEL_ADMIN_FAMILY_NAME: admin
      ZITADEL_ADMIN_DISPLAY_NAME: admin
      ZITADEL_ADMIN_EMAIL: admin@admin.localhost
      ZITADEL_ADMIN_LOGIN_NAME: admin
    volumes:
      - ./scripts/bootstrap_zitadel.mjs:/scripts/bootstrap_zitadel.mjs:ro
      - zitadel-bootstrap:/zitadel/bootstrap:ro
      - workflowsa-zitadel-bootstrap:/workflowsa/bootstrap:rw
    networks:
      - zitadel
    depends_on:
      zitadel-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    labels:
      traefik.enable: "true"
      traefik.docker.network: zitadel
      traefik.http.services.zitadel-login.loadbalancer.server.port: "3000"
      traefik.http.middlewares.zitadel-root-rewrite.replacepath.path: /ui/v2/login/
      traefik.http.routers.zitadel-root.rule: Host(`localhost`) && Path(`/`)
      traefik.http.routers.zitadel-root.entrypoints: web
      traefik.http.routers.zitadel-root.middlewares: zitadel-root-rewrite
      traefik.http.routers.zitadel-root.service: zitadel-login
      traefik.http.routers.zitadel-root.priority: "400"
      traefik.http.routers.zitadel-login.rule: Host(`localhost`) && PathPrefix(`/ui/v2/login`)
      traefik.http.routers.zitadel-login.entrypoints: web
      traefik.http.routers.zitadel-login.service: zitadel-login
      traefik.http.routers.zitadel-login.priority: "250"

  zitadel-proxy:
    image: traefik:v3.6.8
    container_name: workflow-zitadel-proxy
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=zitadel
      - --entrypoints.web.address=:80
      - --api.dashboard=false
      - --api.insecure=false
      - --ping=true
      - --ping.entrypoint=web
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "9180:80"
    networks:
      - zitadel
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      zitadel-api:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy

  app:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: workflow-backend
    ports:
      - "8080:8080"
    environment:
      PG_DSN: host=postgres user=user password=password dbname=workflow_db port=5432 sslmode=disable TimeZone=UTC
      ES_ADDR: http://elasticsearch:9200
      SERVER_ADDR: 0.0.0.0:8080
      IAM_DEPLOYMENT_MODE: zitadel
      IAM_PROVIDER_NAME: ZITADEL
      # Internal discovery goes through the internal ZITADEL reverse proxy on the shared Docker network.
      AUTH_ISSUER_INTERNAL_URL: http://zitadel-proxy
      # Browser-visible issuer URL.
      AUTH_ISSUER_PUBLIC_URL: http://localhost:9180
      # Local development keeps audience enforcement relaxed, so the backend does not require a dedicated confidential client.
      AUTH_CLIENT_ID: workflow-backend
      AUTH_TOKEN_MODE: jwt
      AUTH_INTROSPECTION_URL: ""
      AUTH_INTROSPECTION_CLIENT_ID: ""
      AUTH_INTROSPECTION_CLIENT_SECRET: ""
      AUTH_INTROSPECTION_AUTH_METHOD: basic
      AUTH_CLAIM_SUBJECT_PATH: sub
      # Bundled ZITADEL project roles to create and assign on first boot:
      #   workflowsa client - system/API/SDK integration
      #   workflowsa admin  - full platform administration
      #   workflowsa viewer - read-only platform access
      AUTH_CLAIM_ROLES_PATH: roles,urn:zitadel:iam:org:project:roles,groups
      AUTH_CLAIM_SCOPES_PATH: scope,scp
      AUTH_CLAIM_TENANT_PATH: urn:zitadel:iam:user:resourceowner:id
      AUTH_CLAIM_EMAIL_PATH: email
      AUTH_CLAIM_NAME_PATH: name
      AUTH_ENFORCE_AUDIENCE: "false"
      AUTH_ALLOW_INSECURE_ISSUER: "true"
      FRONTEND_AUTH_OIDC_AUTHORITY: http://localhost:9180
      FRONTEND_AUTH_OIDC_CLIENT_ID_FILE: /workflowsa/bootstrap/workflowsa-frontend-client-id
      ZITADEL_MANAGEMENT_URL: http://zitadel-proxy
      ZITADEL_OWNER_PAT_FILE: /zitadel/bootstrap/owner.pat
      WORKFLOWSA_ZITADEL_BOOTSTRAP_STATE_FILE: /workflowsa/bootstrap/workflowsa-zitadel.json
      ALLOWED_ORIGINS: http://localhost:9100,http://localhost:5173
      CORS_ALLOW_CREDENTIALS: "false"
      RUNTIME_ENABLED: "false"
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
      - workflowsa-zitadel-bootstrap:/workflowsa/bootstrap:ro
    networks:
      - default
      - zitadel
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      zitadel-proxy:
        condition: service_started

  workflow-runtime:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile.runtime
    container_name: workflow-runtime
    environment:
      PG_DSN: host=postgres user=user password=password dbname=workflow_db port=5432 sslmode=disable TimeZone=UTC
      RUNTIME_ENABLED: "true"
      RUNTIME_TICK_INTERVAL: 1s
      RUNTIME_TASK_TIMEOUT: 5s
      METRICS_ADDR: :9091
    depends_on:
      postgres:
        condition: service_healthy

  workflow-query:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile.workflow-query
    container_name: workflow-query
    ports:
      - "8081:8081"
    environment:
      ES_ADDR: http://elasticsearch:9200
      SEARCH_BACKEND: elasticsearch
      QUERY_SERVER_ADDR: 0.0.0.0:8081
      ES_INDEX_PREFIX: workflowsa
      IAM_DEPLOYMENT_MODE: zitadel
      IAM_PROVIDER_NAME: ZITADEL
      AUTH_ISSUER_INTERNAL_URL: http://zitadel-proxy
      AUTH_ISSUER_PUBLIC_URL: http://localhost:9180
      AUTH_CLIENT_ID: workflow-backend
      AUTH_TOKEN_MODE: jwt
      AUTH_INTROSPECTION_URL: ""
      AUTH_INTROSPECTION_CLIENT_ID: ""
      AUTH_INTROSPECTION_CLIENT_SECRET: ""
      AUTH_INTROSPECTION_AUTH_METHOD: basic
      AUTH_CLAIM_SUBJECT_PATH: sub
      # Bundled ZITADEL project roles to create and assign on first boot:
      #   workflowsa client - system/API/SDK integration
      #   workflowsa admin  - full platform administration
      #   workflowsa viewer - read-only platform access
      AUTH_CLAIM_ROLES_PATH: roles,urn:zitadel:iam:org:project:roles,groups
      AUTH_CLAIM_SCOPES_PATH: scope,scp
      AUTH_CLAIM_TENANT_PATH: urn:zitadel:iam:user:resourceowner:id
      AUTH_CLAIM_EMAIL_PATH: email
      AUTH_CLAIM_NAME_PATH: name
      AUTH_ENFORCE_AUDIENCE: "false"
      AUTH_ALLOW_INSECURE_ISSUER: "true"
      FRONTEND_AUTH_OIDC_AUTHORITY: http://localhost:9180
      FRONTEND_AUTH_OIDC_CLIENT_ID_FILE: /workflowsa/bootstrap/workflowsa-frontend-client-id
      ALLOWED_ORIGINS: http://localhost:9100,http://localhost:5173
      CORS_ALLOW_CREDENTIALS: "false"
    volumes:
      - workflowsa-zitadel-bootstrap:/workflowsa/bootstrap:ro
    networks:
      - default
      - zitadel
    depends_on:
      elasticsearch:
        condition: service_healthy
      zitadel-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  sync-worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile.sync-worker
    container_name: workflow-sync-worker
    ports:
      - "8092:8092"
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: workflowsa-sync-worker-v8
      KAFKA_TOPICS: workflow.events.v1,workflowsa.public.process,workflowsa.public.process_instance,workflowsa.public.element_instance,workflowsa.public.variable,workflowsa.public.job,workflowsa.public.incident,workflowsa.public.timer,workflowsa.public.message_subscription
      SYNC_PROJECTION_CONTRACT: hybrid
      KAFKA_DLQ_TOPIC: workflow.sync.dlq
      CONNECT_BOOTSTRAP_ENABLED: "true"
      CONNECT_URL: http://connect:8083
      CONNECTOR_NAME: workflowsa-postgres-connector
      CONNECTOR_FILE: ""
      CONNECTOR_JSON: ""
      CONNECT_WAIT_TIMEOUT_SEC: "180"
      SYNC_MAX_PROCESS_RETRIES: "3"
      SYNC_RETRY_BACKOFF: 500ms
      SYNC_FRESHNESS_SLO_SEC: "120"
      SYNC_HEALTH_FAIL_ON_STALE: "false"
      SYNC_METRICS_ADDR: :8092
      ES_ADDR: http://elasticsearch:9200
      ES_INDEX_PREFIX: workflowsa
    depends_on:
      kafka:
        condition: service_healthy
      connect:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:9100/api
        VITE_OIDC_AUTHORITY: ""
        VITE_OIDC_CLIENT_ID: ""
    container_name: workflow-frontend
    environment:
      VITE_API_URL: http://localhost:9100/api
      IAM_DEPLOYMENT_MODE: zitadel
      # First boot admin login:
      #   URL: http://localhost:9180/ui/console?login_hint=admin
      #   Username: admin
      #   Password: admin
      # Bundled IAM mode generates this initial admin user and bootstraps the Workflowsa project,
      # roles, admin authorization, and frontend OIDC application automatically.
      FRONTEND_AUTH_OIDC_AUTHORITY: http://localhost:9180
      FRONTEND_AUTH_OIDC_CLIENT_ID_FILE: /workflowsa/bootstrap/workflowsa-frontend-client-id
    volumes:
      - workflowsa-zitadel-bootstrap:/workflowsa/bootstrap:ro
    depends_on:
      app:
        condition: service_started
      workflow-query:
        condition: service_started

  gateway:
    image: nginx:alpine
    container_name: workflow-gateway
    ports:
      - "9100:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      frontend:
        condition: service_started
      app:
        condition: service_started
      workflow-query:
        condition: service_started

volumes:
  pgdata:
  esdata:
  zitadel-postgres-data:
  zitadel-bootstrap:
  workflowsa-zitadel-bootstrap:

networks:
  zitadel:
    name: zitadel
