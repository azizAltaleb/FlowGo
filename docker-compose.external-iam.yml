services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: workflow_db
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d workflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  connect:
    image: debezium/connect:2.6
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: workflowsa-debezium
      CONFIG_STORAGE_TOPIC: workflowsa_connect_configs
      OFFSET_STORAGE_TOPIC: workflowsa_connect_offsets
      STATUS_STORAGE_TOPIC: workflowsa_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      ENABLE_DEBEZIUM_SCRIPTING: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  app:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: workflow-backend
    ports:
      - "8080:8080"
    environment:
      PG_DSN: host=postgres user=user password=password dbname=workflow_db port=5432 sslmode=disable TimeZone=UTC
      ES_ADDR: http://elasticsearch:9200
      SERVER_ADDR: 0.0.0.0:8080
      IAM_DEPLOYMENT_MODE: external
      IAM_PROVIDER_NAME: External OIDC Provider
      # Example when the provider is reachable over Docker networking:
      # AUTH_ISSUER_INTERNAL_URL: http://keycloak:8080/realms/workflowsa
      AUTH_ISSUER_INTERNAL_URL: https://login.example.com
      # Example public URL seen by the browser:
      # AUTH_ISSUER_PUBLIC_URL: https://customer-auth.example.com/realms/workflowsa
      AUTH_ISSUER_PUBLIC_URL: https://login.example.com
      AUTH_CLIENT_ID: workflow-backend
      AUTH_TOKEN_MODE: jwt
      # Fill these only when AUTH_TOKEN_MODE=introspection.
      AUTH_INTROSPECTION_URL: ""
      AUTH_INTROSPECTION_CLIENT_ID: ""
      AUTH_INTROSPECTION_CLIENT_SECRET: ""
      AUTH_INTROSPECTION_AUTH_METHOD: basic
      # External IAM must issue one of these roles in the configured roles claim:
      #   workflowsa client - system/API/SDK integration
      #   workflowsa admin  - full platform administration
      #   workflowsa viewer - read-only platform access
      AUTH_CLAIM_SUBJECT_PATH: sub
      AUTH_CLAIM_ROLES_PATH: roles,realm_access.roles,groups
      AUTH_CLAIM_SCOPES_PATH: scope,scp
      AUTH_CLAIM_TENANT_PATH: tenant_id
      AUTH_CLAIM_EMAIL_PATH: email
      AUTH_CLAIM_NAME_PATH: name
      AUTH_ENFORCE_AUDIENCE: "false"
      AUTH_ALLOW_INSECURE_ISSUER: "true"
      ALLOWED_ORIGINS: http://localhost:9100,http://localhost:5173
      CORS_ALLOW_CREDENTIALS: "false"
      RUNTIME_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  workflow-runtime:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile.runtime
    container_name: workflow-runtime
    environment:
      PG_DSN: host=postgres user=user password=password dbname=workflow_db port=5432 sslmode=disable TimeZone=UTC
      RUNTIME_ENABLED: "true"
      RUNTIME_TICK_INTERVAL: 1s
      RUNTIME_TASK_TIMEOUT: 5s
      METRICS_ADDR: :9091
    depends_on:
      postgres:
        condition: service_healthy

  workflow-query:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile.workflow-query
    container_name: workflow-query
    ports:
      - "8081:8081"
    environment:
      ES_ADDR: http://elasticsearch:9200
      SEARCH_BACKEND: elasticsearch
      QUERY_SERVER_ADDR: 0.0.0.0:8081
      ES_INDEX_PREFIX: workflowsa
      IAM_DEPLOYMENT_MODE: external
      IAM_PROVIDER_NAME: External OIDC Provider
      # Example when the provider is reachable over Docker networking:
      # AUTH_ISSUER_INTERNAL_URL: http://keycloak:8080/realms/workflowsa
      AUTH_ISSUER_INTERNAL_URL: https://login.example.com
      # Example public URL seen by the browser:
      # AUTH_ISSUER_PUBLIC_URL: https://customer-auth.example.com/realms/workflowsa
      AUTH_ISSUER_PUBLIC_URL: https://login.example.com
      AUTH_CLIENT_ID: workflow-backend
      AUTH_TOKEN_MODE: jwt
      AUTH_INTROSPECTION_URL: ""
      AUTH_INTROSPECTION_CLIENT_ID: ""
      AUTH_INTROSPECTION_CLIENT_SECRET: ""
      AUTH_INTROSPECTION_AUTH_METHOD: basic
      # External IAM must issue one of these roles in the configured roles claim:
      #   workflowsa client - system/API/SDK integration
      #   workflowsa admin  - full platform administration
      #   workflowsa viewer - read-only platform access
      AUTH_CLAIM_SUBJECT_PATH: sub
      AUTH_CLAIM_ROLES_PATH: roles,realm_access.roles,groups
      AUTH_CLAIM_SCOPES_PATH: scope,scp
      AUTH_CLAIM_TENANT_PATH: tenant_id
      AUTH_CLAIM_EMAIL_PATH: email
      AUTH_CLAIM_NAME_PATH: name
      AUTH_ENFORCE_AUDIENCE: "false"
      AUTH_ALLOW_INSECURE_ISSUER: "true"
      ALLOWED_ORIGINS: http://localhost:9100,http://localhost:5173
      CORS_ALLOW_CREDENTIALS: "false"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  sync-worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile.sync-worker
    container_name: workflow-sync-worker
    ports:
      - "8092:8092"
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: workflowsa-sync-worker-v8
      KAFKA_TOPICS: workflow.events.v1,workflowsa.public.process,workflowsa.public.process_instance,workflowsa.public.element_instance,workflowsa.public.variable,workflowsa.public.job,workflowsa.public.incident,workflowsa.public.timer,workflowsa.public.message_subscription
      SYNC_PROJECTION_CONTRACT: hybrid
      KAFKA_DLQ_TOPIC: workflow.sync.dlq
      CONNECT_BOOTSTRAP_ENABLED: "true"
      CONNECT_URL: http://connect:8083
      CONNECTOR_NAME: workflowsa-postgres-connector
      CONNECTOR_FILE: ""
      CONNECTOR_JSON: ""
      CONNECT_WAIT_TIMEOUT_SEC: "180"
      SYNC_MAX_PROCESS_RETRIES: "3"
      SYNC_RETRY_BACKOFF: 500ms
      SYNC_FRESHNESS_SLO_SEC: "120"
      SYNC_HEALTH_FAIL_ON_STALE: "false"
      SYNC_METRICS_ADDR: :8092
      ES_ADDR: http://elasticsearch:9200
      ES_INDEX_PREFIX: workflowsa
    depends_on:
      kafka:
        condition: service_healthy
      connect:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:9100/api
        VITE_OIDC_AUTHORITY: ""
        VITE_OIDC_CLIENT_ID: ""
    container_name: workflow-frontend
    environment:
      VITE_API_URL: http://localhost:9100/api
      IAM_DEPLOYMENT_MODE: external
      # Example: https://customer-auth.example.com/realms/workflowsa
      FRONTEND_AUTH_OIDC_AUTHORITY: https://login.example.com
      # Example client id generated for a SPA or user-agent application.
      FRONTEND_AUTH_OIDC_CLIENT_ID: workflow-frontend
      # The external IAM administrator must create and assign:
      #   workflowsa admin, workflowsa viewer, workflowsa client
    depends_on:
      app:
        condition: service_started
      workflow-query:
        condition: service_started

  gateway:
    image: nginx:alpine
    container_name: workflow-gateway
    ports:
      - "9100:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      frontend:
        condition: service_started
      app:
        condition: service_started
      workflow-query:
        condition: service_started

volumes:
  pgdata:
  esdata:
