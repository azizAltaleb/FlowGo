server {
    listen 80;
    server_name localhost;
    resolver 127.0.0.11 valid=30s ipv6=off;

    set $workflow_frontend_upstream workflow-frontend:80;
    set $workflow_backend_upstream workflow-backend:8080;
    set $workflow_query_upstream workflow-query:8081;

    # CORS headers for global access (dev only)
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE, PUT' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Correlation-ID' always;

    # Frontend (SPA)
    location / {
        proxy_pass http://$workflow_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_cache_bypass $http_upgrade;
    }

    # Command Service API
    # Route: /api/instances -> http://app:8080/instances
    location /api/ {
        # Strip /api/ prefix if the backend doesn't expect it, 
        # BUT our backend router usually mounts on / or specific paths. 
        # Let's assume we strip it.
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass http://$workflow_backend_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Query Service API
    # Route: /api/query/instances -> http://workflow-query:8081/instances
    location /api/query/ {
        rewrite ^/api/query/(.*) /$1 break;
        
        proxy_pass http://$workflow_query_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

}
