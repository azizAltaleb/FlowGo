name: Release Dry Run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-dry-run:
    name: Validate release candidate locally
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            clients/nodejs-sdk/package-lock.json

      - name: Run release dry run
        env:
          VERSION: 0.1.0-dry-run
          REVISION: ${{ github.sha }}
        run: bash scripts/release_dry_run.sh
