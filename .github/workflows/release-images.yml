name: Release Docker Images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish
        required: true
        default: dev

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  docker-images:
    name: Build, scan, sign, and publish images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: workflow-command
            dockerfile: backend/Dockerfile
            context: .
          - name: workflow-runtime
            dockerfile: backend/Dockerfile.runtime
            context: .
          - name: workflow-query
            dockerfile: backend/Dockerfile.workflow-query
            context: .
          - name: sync-worker
            dockerfile: backend/Dockerfile.sync-worker
            context: .
          - name: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi
          echo "revision=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: workflowsa/${{ matrix.image.name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
            REVISION=${{ steps.version.outputs.revision }}
          sbom: true
          provenance: true

      - name: Scan published image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: workflowsa/${{ matrix.image.name }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes workflowsa/${{ matrix.image.name }}@${{ steps.build.outputs.digest }}
